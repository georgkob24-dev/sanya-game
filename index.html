<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanya Quest V 8.0 - Orenburg Expansion</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Georgia', serif; overflow: hidden; touch-action: manipulation; }
        #game-container { display: none; flex-direction: column; width: 100vw; height: 100vh; position: relative; background: #000; }
        #version-tag { position: fixed; top: 10px; left: 60px; z-index: 4000; color: #fc0; font-weight: bold; font-size: 18px; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000; pointer-events: none; }
        #start-screen, #end-screen, #fail-screen { position: fixed; top:0; left:0; width: 100%; height:100%; background: radial-gradient(circle, #222 0%, #000 100%); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #end-screen { display: none; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://i.ibb.co/HTZqmm91/photo-2026-04-20-12-40-14.jpg'); background-size: cover; z-index: 2100; }
        #fail-screen { display: none; background: #900; z-index: 2500; }
        .main-btn { background: #fc0; color: #000; border: none; padding: 20px 50px; font-weight: bold; font-size: 20px; border-radius: 50px; cursor: pointer; box-shadow: 0 0 30px rgba(252, 204, 0, 0.5); margin-bottom: 15px; }
        .reset-btn { background: transparent; color: #666; border: 1px solid #444; padding: 10px 20px; font-size: 13px; border-radius: 5px; cursor: pointer; }
        #fade-layer { position: absolute; top:0; left:0; width:100%; height:100%; background: #000; z-index: 150; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
        .fade-active { opacity: 1 !important; }
        #scene { position: absolute; top: 0; left: 0; width: 100%; height: 65%; background-size: cover; background-position: center; transition: filter 0.5s; }
        .focus-mode { filter: blur(5px) brightness(0.4); }
        #hero { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); height: 95%; z-index: 5; display: none; pointer-events: none; transition: opacity 0.5s ease; filter: drop-shadow(0 0 25px rgba(0,0,0,0.9)); transform-origin: bottom center; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; cursor: pointer; }
        #bar-container { width: 75%; height: 35px; border: 3px solid #fff; border-radius: 20px; overflow: hidden; margin-top: 20px; background: rgba(255,255,255,0.1); }
        #fill { width: 0%; height: 100%; background: #fc0; transition: width 0.08s linear; }
        #ui { position: absolute; bottom: 0; width: 100%; height: 35%; background: #000; border-top: 3px solid #fc0; display: flex; flex-direction: column; box-sizing: border-box; padding: 15px 20px; z-index: 100; cursor: pointer; }
        #text-area { flex-grow: 1; overflow-y: auto; padding-bottom: 45px; position: relative; pointer-events: none; }
        #choice-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 110; cursor: default; }
        .choice-btn { background: #222; color: #fc0; border: 1px solid #fc0; padding: 12px 20px; margin: 8px; width: 85%; border-radius: 5px; font-size: 16px; cursor: pointer; }
        #next-btn { position: absolute; bottom: 15px; right: 20px; background: #fc0; color: #000; border: none; padding: 12px 30px; font-weight: bold; cursor: pointer; display: none; border-radius: 5px; z-index: 105; }
        #prev-btn { position: absolute; bottom: 15px; left: 20px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #444; padding: 12px 20px; cursor: pointer; display: none; border-radius: 5px; z-index: 105; }
        #name { font-weight: bold; font-size: 18px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; pointer-events: none; }
        #text { font-size: 17px; line-height: 1.4; color: #eee; pointer-events: none; }
        #sound-btn { position: fixed; top: 10px; left: 10px; z-index: 3000; font-size: 20px; cursor: pointer; background: rgba(0,0,0,0.6); border: 1px solid #fc0; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .shake-text { display: inline-block; animation: text-shake-anim 0.2s infinite; color: #f44 !important; }
        @keyframes text-shake-anim { 0% { transform: translate(1px, 1px); } 25% { transform: translate(-1px, -1px); } 50% { transform: translate(-1px, 1px); } 75% { transform: translate(1px, -1px); } 100% { transform: translate(1px, 1px); } }
        .hero-enter { animation: hero-enter-anim 0.8s cubic-bezier(0.175, 0.885, 0.32, 1) forwards; }
        @keyframes hero-enter-anim { from { opacity: 0; transform: translate(-50%, 40px); } to { opacity: 1; transform: translate(-50%, 0); } }
        .hero-idle { animation: hero-breathing 3.5s ease-in-out infinite; }
        @keyframes hero-breathing { 0%, 100% { transform: translate(-50%, 0) scale(1); } 50% { transform: translate(-50%, -10px) scale(1.02); } }
        .long-shake { animation: shake-anim 0.8s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake-anim { 0%, 100% { transform: translate(0, 0); } 10%, 30%, 50%, 70%, 90% { transform: translate(-10px, 0); } 20%, 40%, 60%, 80% { transform: translate(10px, 0); } }
        .red-alert { filter: sepia(1) saturate(15) hue-rotate(-50deg) !important; }
        @keyframes blink { 0%, 100% {opacity: 1;} 50% {opacity: 0.3;} }
    </style>
</head>
<body>
    <div id="version-tag">V 8.0</div>

    <div id="start-screen">
        <h1 style="color:#fc0; font-size: 40px; margin-bottom: 30px;">SANYA QUEST</h1>
        <button class="main-btn" onclick="game.init()">ПРОДОЛЖИТЬ</button>
        <button class="reset-btn" onclick="game.confirmReset()">СБРОСИТЬ ПРОГРЕСС</button>
    </div>

    <div id="fail-screen">
        <h1 style="color:#fff; font-size: 32px; margin-bottom: 10px;">СМЕНА ПРОВАЛЕНА</h1>
        <button class="main-btn" onclick="game.restartLevel()">ПОПРОБОВАТЬ СНОВА</button>
    </div>

    <div id="end-screen">
        <h2 style="color:#fc0; font-size: 32px;">КОНЕЦ ГЛАВЫ</h2>
        <button class="main-btn" onclick="game.resetSave()">В НАЧАЛО</button>
    </div>

    <div id="sound-btn" onclick="game.toggleMusic(event)">🔊</div>

    <div id="game-container">
        <div id="fade-layer"></div>
        <div id="scene"></div>
        <img id="hero" src="" alt="">
        <div id="overlay" onmousedown="game.tap(event)">
            <h2 id="game-title" style="margin:0; color:#fc0;"></h2>
            <div id="bar-container"><div id="fill"></div></div>
            <p id="game-hint" style="color: #fff; margin-top: 15px; font-weight: bold; animation: blink 0.8s infinite;">ЖМИ БЫСТРЕЕ!</p>
        </div>
        <div id="ui" onclick="game.handleUiClick()">
            <div id="choice-container"></div>
            <div id="name">САНЯ</div>
            <div id="text-area"><div id="text"></div></div>
            <button id="prev-btn" onclick="event.stopPropagation(); game.prev()">←</button>
            <button id="next-btn" onclick="event.stopPropagation(); game.next()">ПРОДОЛЖИТЬ →</button>
        </div>
    </div>

<script>
    let audioCtx = null;
    let musicGain = null;
    const game = {
        idx: 0, score: 0, isTyping: false, isMuted: false, 
        drainInterval: null, gameActive: false, gameStartTime: 0,
        tempText: null, currentFullText: "", currentShake: false,
        imgs: {
            morning: "https://i.ibb.co/CNb9jhK/Gemini-Generated-Image-jgx79tjgx79tjgx7.png",
            work: "https://i.ibb.co/W7XwXnJ/Gemini-Generated-Image-eemupteemupteemu.png",
            airport: "https://i.ibb.co/rKHRdknD/photo-2026-04-20-12-34-59.jpg",
            thoughts: "https://i.ibb.co/HTZqmm91/photo-2026-04-20-12-40-14.jpg",
            bar_bg: "https://i.ibb.co/39R0LNDX/1776641464055.png",
            home_bg: "https://i.ibb.co/mrWfGrYh/1776641563597.png",
            dima: "https://i.ibb.co/0jMLHKCT/1776641481868.png",
            dima_home: "https://i.ibb.co/3mNShXVr/photo-2026-04-20-16-18-57.jpg",
            gosha: "https://i.ibb.co/CLDvbjB/1776641475450.png",
            gosha_food: "https://i.ibb.co/mFGx7Bbg/photo-2026-04-20-16-08-46.jpg",
            // НОВЫЕ ИЗОБРАЖЕНИЯ
            orenburg: "https://i.ibb.co/RT7Cx4hr/df3f4211-edb6-4300-a816-ae9feaef3bda.png",
            sonya_home: "https://i.ibb.co/7tVzn2Zx/Chat-GPT-Image-21-2026-01-11-15.png",
            kitchen_eggs: "https://i.ibb.co/mrWfGrYh/1776641563597.png", // Используем фон кухни
            tattoo_katya: "https://i.ibb.co/W7XwXnJ/Gemini-Generated-Image-eemupteemupteemu.png", 
            park_final: "https://i.ibb.co/CNb9jhK/Gemini-Generated-Image-jgx79tjgx79tjgx7.png"
        },
        colors: { 
            "Саня": "#fc0", "Дима": "#ff3030", "Гоша": "#30ff30", 
            "Артур": "#00dfff", "Соня": "#ff69b4", "Катя": "#b388ff", "Работа": "#fc0", "Рассказчик": "#888" 
        },
        story: [
            { n: "Саня", t: "Доброе утро, я проснулся... Орск, ты меня когда-нибудь отпустишь?", b: 'morning', c: 'morning' },
            { n: "Работа", t: "Так, смена началась. Погнали давить тягу!", b: 'work', c: 'work', hasGame: "train" },
            { n: "Саня", t: "Гул самолёта... я не могу сомкнуть глаз. Все мысли только о Кате.", b: 'thoughts', c: 'thoughts' },
            { n: "Дима", t: "Саня! Брат! Ну что, по первой за приезд?", b: 'bar_bg', c: 'dima' },
            { n: "Гоша", t: "Машинист прибыл! Доставка как раз вовремя!", b: 'home_bg', c: 'gosha_food' },
            { n: "Саня", t: "Ну всё, Гоша, делись наггетсами!", b: 'home_bg', c: 'none', hasGame: "nuggets", shakeOnType: true },
            
            // --- НОВАЯ ЧАСТЬ 8.0 ---
            { n: "Саня", t: "Ну ладно, пацаны. Посидели круто, но мне пора. Беру билеты в Оренбург!", b: 'bar_bg', c: 'none' },
            { n: "Гоша", t: "Уже улетаешь? Ну, давай, Саня. Удачного пути!", b: 'bar_bg', c: 'gosha' },
            { n: "Саня", t: "Самолёт Оренбургских авиаций. Лечу к Артуру и Соне.", b: 'airport', c: 'none' },
            { n: "Артур", t: "Салам, Саня! Мамбетка ты моя, наконец-то добрался!", b: 'orenburg', c: 'none' },
            { n: "Соня", t: "Санечка, привет! Проходи, мы как раз чай поставили.", b: 'orenburg', c: 'none' },
            { n: "Соня", t: "Саш, я тут с Катей общалась... Она про тебя спрашивала. Знаешь, позови её к нам, когда мы уедем.", b: 'sonya_home', c: 'none' },
            { n: "Артур", t: "Короче, брат. Мы с Соней на неделю в Казахстан отчаливаем. Хата твоя, пользуйся моментом!", b: 'orenburg', c: 'none' },
            { n: "Саня", t: "Пасха... Катя пришла ко мне. Мы стоим на кухне, и она учит меня красить яйца.", b: 'kitchen_eggs', c: 'none' },
            { n: "Катя", t: "Смотри, Саш, нужно аккуратно... Вот так. У тебя получается!", b: 'kitchen_eggs', c: 'none' },
            { n: "Саня", t: "Потом мы смотрели 'Хоббита'. Просто лежали рядом, было так спокойно. Мы не целовались, но это было не нужно.", b: 'thoughts', c: 'none' },
            { n: "Саня", t: "Через пару дней я пришел к ней бить тату. Она сосредоточена на работе...", b: 'tattoo_katya', c: 'none' },
            { n: "Катя", t: "Саш... мы расстались с моим парнем. И знаешь... я люблю тебя.", b: 'tattoo_katya', c: 'none' },
            { n: "Саня", t: "Этот день мы провели только вдвоем. Гуляли, смеялись, катались на аттракционах. Кажется, я наконец-то дома.", b: 'park_final', c: 'none' }
        ],

        async init() {
            const savedIdx = localStorage.getItem('sanya_quest_idx');
            if (savedIdx !== null) this.idx = Math.min(parseInt(savedIdx), this.story.length - 1);
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                musicGain = audioCtx.createGain(); musicGain.connect(audioCtx.destination);
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                this.startMusic();
            } catch(e) {}
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            this.update();
        },

        confirmReset() { if (confirm("Весь прогресс будет удален. Вы уверены?")) this.resetSave(); },
        resetSave() { localStorage.removeItem('sanya_quest_idx'); location.reload(); },
        restartLevel() { document.getElementById('fail-screen').style.display = 'none'; this.update(); },

        playClick() {
            if (!audioCtx || this.isMuted) return;
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(280, audioCtx.currentTime);
            g.gain.setValueAtTime(0.04, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.03);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.04);
        },

        startMusic() {
            if (this.musicStarted) return; this.musicStarted = true;
            setInterval(() => {
                if (this.isMuted || !audioCtx) return;
                const f = [196, 220, 246, 261][Math.floor(Date.now()/1200)%4];
                const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
                osc.type = 'triangle'; osc.frequency.setValueAtTime(f/2, audioCtx.currentTime);
                g.gain.setValueAtTime(0, audioCtx.currentTime);
                g.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 0.1);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.5);
                osc.connect(g); g.connect(musicGain); osc.start(); osc.stop(audioCtx.currentTime + 2.5);
            }, 1250);
        },

        toggleMusic(e) {
            if (e) e.stopPropagation();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            this.isMuted = !this.isMuted;
            document.getElementById('sound-btn').innerText = this.isMuted ? "🔇" : "🔊";
        },

        typeText(element, text, shake) {
            let i = 0; element.innerHTML = ""; this.isTyping = true;
            this.currentFullText = text; this.currentShake = shake;
            element.className = shake ? "shake-text" : "";
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('prev-btn').style.display = 'none';
            if (this.textTimer) clearInterval(this.textTimer);
            this.textTimer = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    if (text.charAt(i) !== " ") this.playClick();
                    i++;
                } else { this.finishTyping(); }
            }, 30);
        },

        finishTyping() {
            clearInterval(this.textTimer);
            this.isTyping = false;
            document.getElementById('text').innerHTML = this.currentFullText;
            document.getElementById('text').className = this.currentShake ? "shake-text" : "";
            document.getElementById('next-btn').style.display = 'block';
            if (this.idx > 0) document.getElementById('prev-btn').style.display = 'block';
        },

        handleUiClick() {
            if (this.isTyping) { this.finishTyping(); } 
            else if (!this.gameActive) { this.next(); }
        },

        async update() {
            const fade = document.getElementById('fade-layer');
            fade.classList.add('fade-active');
            await new Promise(r => setTimeout(r, 500));

            localStorage.setItem('sanya_quest_idx', this.idx);
            const s = this.story[this.idx];
            const scene = document.getElementById('scene');
            const hero = document.getElementById('hero');
            const ui = document.getElementById('ui');
            const nameEl = document.getElementById('name');

            scene.style.backgroundImage = `url('${this.imgs[s.b]}')`;
            nameEl.style.color = this.colors[s.n] || "#fff";
            ui.style.borderColor = this.colors[s.n] || "#fc0";
            nameEl.innerText = s.n;

            if (s.c && s.c !== 'none') {
                scene.classList.add('focus-mode'); hero.src = this.imgs[s.c];
                hero.style.display = 'block'; hero.classList.add('hero-enter');
                setTimeout(() => { if(hero.classList.contains('hero-enter')) hero.classList.add('hero-idle'); }, 800);
            } else {
                scene.classList.remove('focus-mode'); hero.style.display = 'none';
            }
            
            const overlay = document.getElementById('overlay');
            if (s.hasGame) {
                this.gameActive = true; this.score = 40;
                this.gameStartTime = Date.now();
                document.getElementById('fill').style.width = '40%';
                overlay.style.display = 'flex';
                document.getElementById('game-title').innerText = s.hasGame === "train" ? "ДАВИ ТЯГУ!" : "ОТБЕРИ НАГГЕТСЫ!";
                this.startDrain(s.hasGame);
            } else {
                this.gameActive = false; overlay.style.display = 'none'; this.stopDrain();
            }

            fade.classList.remove('fade-active');
            this.typeText(document.getElementById('text'), s.t, s.shakeOnType);
        },

        startDrain(type) {
            this.stopDrain();
            this.drainInterval = setInterval(() => {
                if (this.gameActive) {
                    this.score -= (type === "train") ? 2.2 : 2.0; 
                    if (type === "train" && this.score <= 0 && (Date.now() - this.gameStartTime > 3000)) {
                        this.stopDrain(); this.gameActive = false;
                        document.getElementById('fail-screen').style.display = 'flex';
                    }
                    document.getElementById('fill').style.width = Math.max(0, this.score) + '%';
                }
            }, 100);
        },

        stopDrain() { if (this.drainInterval) clearInterval(this.drainInterval); },

        next() { 
            if (this.isTyping || this.gameActive) return;
            if (this.idx < this.story.length - 1) { this.idx++; this.update(); } 
            else { document.getElementById('end-screen').style.display = 'flex'; }
        },
        
        prev() { if (!this.isTyping && this.idx > 0) { this.idx--; this.update(); } },

        tap(e) {
            e.preventDefault(); if (!this.gameActive) return;
            const type = this.story[this.idx].hasGame;
            this.score += (type === "train") ? 7.5 : 12;
            if (type === "nuggets" && this.score >= 65) {
                this.stopDrain(); this.gameActive = false;
                const container = document.getElementById('game-container');
                container.classList.add('long-shake', 'red-alert');
                setTimeout(() => {
                    container.classList.remove('long-shake', 'red-alert');
                    this.idx++; this.update();
                }, 1200);
                return;
            }
            if (this.score >= 100) {
                this.score = 100; this.stopDrain(); this.gameActive = false;
                setTimeout(() => { this.idx++; this.update(); }, 200);
            }
            document.getElementById('fill').style.width = this.score + '%';
        }
    };
</script>
</body>
</html>
