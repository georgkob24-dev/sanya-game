<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanya Quest V 1.9</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Georgia', serif; overflow: hidden; touch-action: manipulation; }
        #game-container { display: flex; flex-direction: column; width: 100vw; height: 100vh; position: relative; }
        
        #scene { 
            position: absolute; top: 0; left: 0; width: 100%; height: 65%;
            background-size: cover; background-position: center; 
            background-repeat: no-repeat; background-color: #000; z-index: 1;
        }

        /* Слой для персонажей поверх фона */
        #hero { 
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            height: 90%; z-index: 2; display: none; pointer-events: none;
        }

        #ui {
            position: absolute; bottom: 0; width: 100%; height: 35%;
            background: linear-gradient(to bottom, #111, #000); border-top: 2px solid #fc0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; cursor: pointer; z-index: 10; box-sizing: border-box; padding: 25px;
        }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 65%;
            background: rgba(0,0,0,0.6); display: none; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 50;
        }
        #bar-container { width: 70%; height: 20px; border: 1px solid #fff; border-radius: 5px; overflow: hidden; margin-top: 10px; }
        #fill { width: 0%; height: 100%; background: #fc0; }

        #name { color: #fc0; font-weight: bold; font-size: 20px; margin-bottom: 10px; letter-spacing: 2px; }
        #text { font-size: 17px; line-height: 1.5; color: #ddd; }
        #v { position: fixed; top: 5px; right: 5px; font-size: 10px; color: #444; z-index: 1000; }
    </style>
</head>
<body>
    <div id="v">V 1.9 - REUNION</div>

    <div id="game-container">
        <div id="scene">
            <img id="hero" src="" alt="">
            <div id="overlay" onclick="game.tap(event)">
                <h2 style="margin:0; color:#fc0; font-size: 18px;">ДАВИ ТЯГУ!</h2>
                <div id="bar-container"><div id="fill"></div></div>
            </div>
        </div>

        <div id="ui" onclick="game.next()">
            <div id="name">ЗАГРУЗКА</div>
            <div id="text">...</div>
        </div>
    </div>

<script>
    const game = {
        idx: 0,
        score: 0,
        imgs: {
            morning: "https://i.ibb.co/CNb9jhK/Gemini-Generated-Image-jgx79tjgx79tjgx7.png",
            work: "https://i.ibb.co/W7XwXnJ/Gemini-Generated-Image-eemupteemupteemu.png",
            airport: "https://i.ibb.co/rKHRdknD/photo-2026-04-20-12-34-59.jpg",
            thoughts: "https://i.ibb.co/HTZqmm91/photo-2026-04-20-12-40-14.jpg",
            bar_bg: "https://i.ibb.co/39R0LNDX/1776641464055.png", // Фон бара
            home_bg: "https://i.ibb.co/mrWfGrYh/1776641563597.png", // Дом Димы
            dima: "https://i.ibb.co/0jMLHKCT/1776641481868.png",   // Спрайт Димы
            gosha: "https://i.ibb.co/CLDvbjB/1776641475450.png"   // Спрайт Гоши
        },
        story: [
            { n: "Саня", t: "Доброе утро, я проснулся...", b: 'morning' },
            { n: "Работа", t: "Смена в РЖД. Погнали давить тягу!", b: 'work', hasGame: true },
            { n: "Саня", t: "Лечу в Москву! Скорей бы увидеться с Димой и Гошей.", b: 'airport' },
            { n: "Рассказчик", t: "Внутри него разверзается бездна. Любовь к Кате грызет его изнутри...", b: 'thoughts' },
            
            // НОВАЯ ЧАСТЬ: ВСТРЕЧА
            { n: "Саня", t: "А вот и они! Пацаны, как же я рад вас видеть! Москва, я скучал!", b: 'bar_bg', c: 'none' },
            { n: "Дима", t: "Саня, здорово! Наконец-то ты выбрался из своего Орска. Пойдем, отметим приезд!", b: 'bar_bg', c: 'dima' },
            { n: "Гоша", t: "Здорово, Саня! Ну что, готов к московским ночам? Мы уже столик забронировали.", b: 'bar_bg', c: 'gosha' },
            { n: "Рассказчик", t: "Вечер пролетел незаметно. Звон бокалов, смех и старые истории заставили Саню ненадолго забыть о боли в сердце.", b: 'bar_bg', c: 'none' },
            { n: "Рассказчик", t: "Градус рос, а разговоры становились всё душевнее. В какой-то момент было решено ехать продолжать к Диме.", b: 'bar_bg', c: 'none' },
            
            // ДОМА У ДИМЫ
            { n: "Саня", t: "Хорошо сидим. У тебя, Дим, как всегда уютно.", b: 'home_bg', c: 'none' },
            { n: "Дима", t: "Чувствуй себя как дома, Санек. Располагайся.", b: 'home_bg', c: 'dima' },
            { n: "Система", t: "Продолжение следует...", b: 'home_bg', c: 'none' }
        ],
        update() {
            const s = this.story[this.idx];
            const scene = document.getElementById('scene');
            const hero = document.getElementById('hero');
            const overlay = document.getElementById('overlay');
            const nameEl = document.getElementById('name');

            scene.style.backgroundImage = `url('${this.imgs[s.b]}')`;
            
            if (s.c && s.c !== 'none') {
                hero.src = this.imgs[s.c];
                hero.style.display = 'block';
            } else {
                hero.style.display = 'none';
            }

            nameEl.innerText = s.n;
            document.getElementById('text').innerText = s.t;
            overlay.style.display = s.hasGame ? 'flex' : 'none';
            nameEl.style.color = (s.n === "Рассказчик") ? "#aaa" : "#fc0";
        },
        next() {
            if (this.story[this.idx].hasGame) return;
            this.idx++;
            if (this.idx >= this.story.length) this.idx = 0;
            this.update();
        },
        tap(e) {
            e.stopPropagation();
            this.score += 25;
            document.getElementById('fill').style.width = this.score + '%';
            if (this.score >= 100) {
                this.score = 0;
                this.story[this.idx].hasGame = false;
                this.next();
            }
        }
    };

    window.onload = () => game.update();
</script>
</body>
</html>
