<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanya Quest V 3.2 - Nugget Heist</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Georgia', serif; overflow: hidden; touch-action: manipulation; }
        #game-container { display: flex; flex-direction: column; width: 100vw; height: 100vh; position: relative; }
        #scene { position: absolute; top: 0; left: 0; width: 100%; height: 65%; background-size: cover; background-position: center; z-index: 1; transition: background 0.3s; }
        #hero { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); height: 90%; z-index: 2; display: none; pointer-events: none; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 500; cursor: pointer; user-select: none; }
        #bar-container { width: 70%; height: 35px; border: 3px solid #fff; border-radius: 20px; overflow: hidden; margin-top: 20px; pointer-events: none; background: rgba(255,255,255,0.1); }
        #fill { width: 0%; height: 100%; background: #fc0; transition: width 0.05s linear; box-shadow: 0 0 15px #fc0; }
        .nugget-mode #fill { background: #ff4400; box-shadow: 0 0 20px #ff4400; animation: pulse 0.5s infinite; }
        #ui { position: absolute; bottom: 0; width: 100%; height: 35%; background: #000; border-top: 3px solid #fc0; display: flex; flex-direction: column; box-sizing: border-box; padding: 20px 25px; z-index: 10; }
        #text-area { flex-grow: 1; overflow-y: auto; padding-bottom: 50px; }
        #next-btn { position: absolute; bottom: 15px; right: 20px; background: #fc0; color: #000; border: none; padding: 12px 30px; font-weight: bold; font-family: 'Georgia', serif; cursor: pointer; display: none; border-radius: 5px; font-size: 16px; box-shadow: 0 0 15px rgba(252, 204, 0, 0.3); z-index: 100; }
        #name { color: #fc0; font-weight: bold; font-size: 20px; margin-bottom: 8px; letter-spacing: 2px; text-transform: uppercase; text-align: left; }
        #text { font-size: 18px; line-height: 1.4; color: #eee; text-align: left; }
        #sound-btn { position: fixed; top: 15px; left: 15px; z-index: 1001; font-size: 24px; cursor: pointer; background: rgba(0,0,0,0.8); border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border: 2px solid #fc0; }
        #v { position: fixed; top: 5px; right: 5px; font-size: 10px; color: #444; z-index: 1000; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="v">V 3.2 - NUGGET HEIST</div>
    <div id="sound-btn" onclick="game.toggleMusic(event)">🔊</div>
    <div id="game-container">
        <div id="scene">
            <img id="hero" src="" alt="">
            <div id="overlay" onmousedown="game.tap(event)" onclick="game.tap(event)">
                <h2 id="game-title" style="margin:0; color:#fc0; font-size: 28px; text-shadow: 0 0 15px #fc0; text-align:center;"></h2>
                <div id="bar-container"><div id="fill"></div></div>
                <p id="game-hint" style="color: #fff; margin-top: 20px; font-size: 18px; font-weight: bold; animation: blink 1s infinite;"></p>
            </div>
        </div>
        <div id="ui">
            <div id="name">САНЯ</div>
            <div id="text-area"><div id="text"></div></div>
            <button id="next-btn" onclick="game.next()">ПРОДОЛЖИТЬ →</button>
        </div>
    </div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let musicGain = audioCtx.createGain();
    musicGain.connect(audioCtx.destination);
    musicGain.gain.value = 0.8;

    function playRetroClick() {
        if (game.isMuted) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(280, audioCtx.currentTime);
        g.gain.setValueAtTime(0.2, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.03);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.04);
    }

    function playMusicStep(time, freq, dur) {
        if (game.isMuted) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, time);
        g.gain.setValueAtTime(0, time);
        g.gain.linearRampToValueAtTime(0.5, time + 0.1);
        g.gain.exponentialRampToValueAtTime(0.001, time + dur);
        osc.connect(g); g.connect(musicGain);
        osc.start(time); osc.stop(time + dur);
    }
