<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanya Quest V1.3</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
        #game-container { display: flex; flex-direction: column; width: 100vw; height: 100vh; }
        
        /* Фон */
        #scene { 
            flex: 1; position: relative; 
            background-size: cover; background-position: center; 
            background-repeat: no-repeat; background-color: #1a1a1a;
        }

        /* Персонаж Саня/Дима/Гоша */
        #hero { 
            position: absolute; bottom: 0; left: 50%; 
            transform: translateX(-50%); height: 85%; 
            z-index: 5; display: none; pointer-events: none;
        }

        /* Текстовый блок */
        #ui {
            height: 35%; background: #000; border-top: 3px solid #fc0; 
            padding: 20px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center; 
            cursor: pointer; box-sizing: border-box; z-index: 10;
        }

        /* Мини-игра */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        #progress-bar { width: 80%; height: 25px; border: 2px solid #fff; margin-top: 20px; border-radius: 10px; overflow: hidden; }
        #fill { width: 0%; height: 100%; background: #fc0; transition: width 0.1s; }

        #name { color: #fc0; font-weight: bold; font-size: 22px; margin-bottom: 8px; }
        #text { font-size: 18px; line-height: 1.3; }
        #v { position: fixed; top: 5px; left: 5px; font-size: 10px; color: #444; }
    </style>
</head>
<body>
    <div id="v">V 1.3 - ТЯГА</div>

    <div id="game-container">
        <div id="scene"><img id="hero" src="" alt=""></div>
        <div id="ui" onclick="game.next()">
            <div id="name">СИСТЕМА</div>
            <div id="text">Запуск...</div>
        </div>
    </div>

    <div id="overlay" onclick="game.tap()">
        <h2 id="game-task">ДАВИ ТЯГУ ДО МОСКВЫ!</h2>
        <div id="progress-bar"><div id="fill"></div></div>
        <p style="margin-top:20px; color:#aaa;">ТАПАЙ БЫСТРО!</p>
    </div>

<script>
    const game = {
        idx: 0,
        score: 0,
        imgs: {
            cab: "https://i.ibb.co/TD8nkb1K/1776641277961.png",      // Фон: Кабина
            bars: "https://i.ibb.co/39R0LNDX/1776641464055.png",     // Саня
            home: "https://i.ibb.co/mrWfGrYh/1776641563597.png",     // Фон: Дом
            dima: "https://i.ibb.co/0jMLHKCT/1776641481868.png",     // Дима
            gosha: "https://i.ibb.co/CLDvbjB/1776641475450.png"      // Гоша
        },
        story: [
            { n: "Саня", t: "Всё, пацаны, Орск до связи! Хочу в Москву, там вся движуха. Погнали!", c: 'bars', b: 'cab' },
            { type: 'minigame' }, // МИНИ-ИГРА ТУТ
            { n: "Саня", t: "Ну вот она, Москва! Не зря тягу давил. Встречай, столица!", c: 'bars', b: 'cab' },
            { n: "Дима", t: "Саня! Красава, что доехал! Рады видеть в Москве!", c: 'dima', b: 'cab' },
            { n: "Гоша", t: "Здорово, Саня! Ну что, сразу в бар или как?", c: 'gosha', b: 'cab' },
            { n: "У Димы", t: "Слушайте, мужики... Я в Катю влюбился. Из Оренбурга. Сильно.", c: 'none', b: 'home' }
        ],
        update() {
            const s = this.story[this.idx];
            if (!s) return;

            if (s.type === 'minigame') {
                document.getElementById('overlay').style.display = 'flex';
                return;
            }

            document.getElementById('overlay').style.display = 'none';
            const scene = document.getElementById('scene');
            const hero = document.getElementById('hero');

            // Установка фона
            scene.style.backgroundImage = `url('${this.imgs[s.b]}')`;

            // Установка персонажа
            if (s.c === 'none' || !this.imgs[s.c]) {
                hero.style.display = 'none';
            } else {
                hero.src = this.imgs[s.c];
                hero.style.display = 'block';
            }

            document.getElementById('name').innerText = s.n;
            document.getElementById('text').innerText = s.t;
        },
        next() {
            if (this.idx < this.story.length - 1) {
                this.idx++;
                this.update();
            } else {
                this.idx = 0;
                this.update();
            }
        },
        tap() {
            this.score += 10; // Сила тапа
            document.getElementById('fill').style.width = this.score + '%';
            if (this.score >= 100) {
                this.score = 0;
                document.getElementById('fill').style.width = '0%';
                this.next();
            }
        }
    };

    window.onload = () => {
        game.idx = 0;
        game.update();
    };
</script>
</body>
</html>
