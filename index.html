<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanya Quest</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
        #game-container { display: flex; flex-direction: column; width: 100vw; height: 100vh; }
        #scene { flex: 1; position: relative; background-size: cover; background-position: center; background-color: #1a1a1a; transition: opacity 0.3s; }
        #hero { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); height: 90%; z-index: 5; display: none; pointer-events: none; }
        #ui { height: 35%; background: #000; border-top: 3px solid #fc0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; cursor: pointer; box-sizing: border-box; }
        #name { color: #fc0; font-weight: bold; font-size: 22px; margin-bottom: 8px; min-height: 26px; }
        #text { font-size: 18px; line-height: 1.3; min-height: 50px; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="scene"><img id="hero" src="" alt=""></div>
        <div id="ui" onclick="game.next()">
            <div id="name">ЗАГРУЗКА...</div>
            <div id="text">Подождите, история Сани начинается</div>
        </div>
    </div>

<script>
    // Кэшируем элементы один раз, чтобы не искать их постоянно
    const el = {
        name: document.getElementById('name'),
        text: document.getElementById('text'),
        scene: document.getElementById('scene'),
        hero: document.getElementById('hero')
    };

    const game = {
        idx: 0,
        imgs: {
            cab: "https://i.ibb.co/TD8nkb1K/1776641277961.png",
            bars: "https://i.ibb.co/39R0LNDX/1776641464055.png",
            home: "https://i.ibb.co/mrWfGrYh/1776641563597.png",
            dima: "https://i.ibb.co/0jMLHKCT/1776641481868.png",
            gosha: "https://i.ibb.co/CLDvbjB/1776641475450.png"
        },
        story: [
            { n: "Саня", t: "Всё, пацаны. Орск подождёт, я в Москве! Погнали гулять.", c: 'bars', b: 'cab' },
            { n: "Дима", t: "Саня, наконец-то! Столица тебя заждалась.", c: 'dima', b: 'bars' },
            { n: "Гоша", t: "Здорово! Предлагаю сразу в бар, обсудим твои новости.", c: 'gosha', b: 'bars' },
            { n: "У Димы", t: "Слушайте... Я в Катю влюбился. Сильно. Что делать-то теперь?", c: 'bars', b: 'home' },
            { n: "Система", t: "Конец демо-версии. Скоро будет продолжение!", c: 'bars', b: 'home' }
        ],
        update() {
            const s = this.story[this.idx];
            if (!s) return;

            // Обновляем текст
            el.name.innerText = s.n;
            el.text.innerText = s.t;

            // Обновляем фон (безопасно)
            const bgUrl = this.imgs[s.b];
            el.scene.style.backgroundImage = `url('${bgUrl}')`;

            // Обновляем персонажа
            if (s.b === 'home') {
                el.hero.style.display = 'none';
                el.hero.src = ""; // Очищаем старую картинку
            } else {
                const charUrl = this.imgs[s.c];
                el.hero.src = charUrl;
                el.hero.style.display = 'block';
            }
        },
        next() {
            this.idx++;
            if (this.idx >= this.story.length) {
                this.idx = 0; // Зацикливаем для теста
            }
            this.update();
        }
    };

    // ГЛАВНОЕ ИЗМЕНЕНИЕ: Не ждем onload, запускаем как только готов DOM
    document.addEventListener('DOMContentLoaded', () => {
        // Небольшая задержка, чтобы WebView проснулся
        setTimeout(() => {
            game.update();
        }, 100);
    });

    // Резервный запуск
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        game.update();
    }
</script>
</body>
</html>
