<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
        #game-container { display: flex; flex-direction: column; width: 100vw; height: 100vh; }
        
        /* Зона фона */
        #scene { 
            flex: 1; position: relative; 
            background-size: cover; background-position: center; 
            background-color: #1a1a1a; overflow: hidden;
        }

        /* Зона персонажа - теперь он всегда поверх фона и четко снизу */
        #hero { 
            position: absolute; 
            bottom: 0; left: 50%; 
            transform: translateX(-50%);
            width: auto; height: 90%; /* Подгоняем рост под экран */
            z-index: 5;
            display: none; /* Прячем до загрузки */
        }

        /* Текстовое поле */
        #ui {
            height: 35%; background: #000; 
            border-top: 3px solid #ffcc00; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; cursor: pointer; box-sizing: border-box;
        }

        #name { color: #ffcc00; font-weight: bold; font-size: 22px; margin-bottom: 8px; text-transform: uppercase; }
        #text { font-size: 18px; line-height: 1.3; margin: 0; }
        #hint { font-size: 10px; color: #444; margin-top: 15px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="scene">
        <img id="hero" src="" alt="">
    </div>
    <div id="ui" onclick="game.next()">
        <div id="name">СИСТЕМА</div>
        <div id="text">Загрузка истории...</div>
        <div id="hint">ТАПАЙ ПО ТЕКСТУ</div>
    </div>
</div>

<script>
    const game = {
        idx: 0,
        imgs: {
            cab: "https://i.ibb.co/TD8nkb1K/1776641277961.png",
            bars: "https://i.ibb.co/39R0LNDX/1776641464055.png",
            home: "https://i.ibb.co/mrWfGrYh/1776641563597.png",
            dima: "https://i.ibb.co/0jMLHKCT/1776641481868.png",
            gosha: "https://i.ibb.co/CLDvbjB/1776641475450.png"
        },
        story: [
            { n: "Саня", t: "Всё, пацаны. Орск подождёт, я в Москве! Погнали гулять.", c: 'bars', b: 'cab' },
            { n: "Дима", t: "Саня, наконец-то! Столица тебя заждалась. Видок у тебя боевой!", c: 'dima', b: 'bars' },
            { n: "Гоша", t: "Здорово! Предлагаю сразу в бар, обсудим твои новости.", c: 'gosha', b: 'bars' },
            { n: "Саня", t: "Слушайте... Я вообще чего приехал. Я в Катю влюбился. Сильно.", c: 'bars', b: 'home' },
            { n: "Система", t: "Конец демо-версии. Продолжение скоро!", c: 'bars', b: 'home' }
        ],

        update() {
            const s = this.story[this.idx];
            if (!s) return;

            const scene = document.getElementById('scene');
            const hero = document.getElementById('hero');

            // 1. Ставим фон
            scene.style.backgroundImage = `url('${this.imgs[s.b]}')`;

            // 2. Логика персонажа: если это домашняя сцена, прячем отдельного героя
            if (s.b === 'home') {
                hero.style.display = 'none';
            } else {
                hero.src = this.imgs[s.c];
                hero.style.display = 'block';
            }

            // 3. Текст
            document.getElementById('name').innerText = s.n;
            document.getElementById('text').innerText = s.t;
        },

        next() {
            if (this.idx < this.story.length - 1) {
                this.idx++;
                this.update();
            }
        }
    };

    // За
