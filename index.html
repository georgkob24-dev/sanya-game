<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanya Quest V1.6</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
        #game-container { display: flex; flex-direction: column; width: 100vw; height: 100vh; position: relative; }
        
        #scene { 
            position: absolute; top: 0; left: 0; width: 100%; height: 65%;
            background-size: cover; background-position: center; 
            background-repeat: no-repeat; background-color: #000; z-index: 1;
        }

        #ui {
            position: absolute; bottom: 0; width: 100%; height: 35%;
            background: #000; border-top: 3px solid #fc0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; cursor: pointer; z-index: 10; box-sizing: border-box; padding: 20px;
        }

        /* Мини-игра поверх кабины */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 65%;
            background: rgba(0,0,0,0.6); display: none; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 50;
        }
        #bar-container { width: 70%; height: 20px; border: 2px solid #fff; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        #fill { width: 0%; height: 100%; background: #fc0; }

        #name { color: #fc0; font-weight: bold; font-size: 22px; margin-bottom: 8px; }
        #text { font-size: 18px; line-height: 1.3; }
        #v { position: fixed; top: 5px; left: 5px; font-size: 10px; color: #222; }
    </style>
</head>
<body>
    <div id="v">V 1.6 - WORKING DAY</div>

    <div id="game-container">
        <div id="scene">
            <div id="overlay" onclick="game.tap(event)">
                <h2 style="margin:0; color:#fc0; font-size: 20px;">ДАВИ ТЯГУ!</h2>
                <div id="bar-container"><div id="fill"></div></div>
                <p style="font-size:12px; margin-top:5px;">ТАПАЙ ПО ЭКРАНУ</p>
            </div>
        </div>

        <div id="ui" onclick="game.next()">
            <div id="name">САНЯ</div>
            <div id="text">...</div>
        </div>
    </div>

<script>
    const game = {
        idx: 0,
        score: 0,
        imgs: {
            morning: "https://i.ibb.co/CNb9jhK/Gemini-Generated-Image-jgx79tjgx79tjgx7.png", // Дом
            work: "https://i.ibb.co/W7XwXnJ/Gemini-Generated-Image-eemupteemupteemu.png",    // Кабина
            bars: "https://i.ibb.co/39R0LNDX/1776641464055.png" // Саня в Москве
        },
        story: [
            { n: "Саня", t: "Доброе утро, я проснулся...", b: 'morning' },
            { n: "Саня", t: "Надо попить кофе и идти на работу.", b: 'morning' },
            { n: "Работа", t: "Так, смена началась. Погнали давить тягу!", b: 'work', hasGame: true },
            { n: "Саня", t: "Фух, смена закончена. Пора в Москву!", b: 'work' },
            { n: "Система", t: "Продолжение следует...", b: 'bars' }
        ],
        update() {
            const s = this.story[this.idx];
            const scene = document.getElementById('scene');
            const overlay = document.getElementById('overlay');

            scene.style.backgroundImage = `url('${this.imgs[s.b]}')`;
            document.getElementById('name').innerText = s.n;
            document.getElementById('text').innerText = s.t;

            // Показываем мини-игру только если в сцене есть флаг hasGame
            overlay.style.display = s.hasGame ? 'flex' : 'none';
        },
        next() {
            // Если сейчас идет мини-игра, клик по UI не переключает сцену
            if (this.story[this.idx].hasGame) return;

            this.idx++;
            if (this.idx >= this.story.length) this.idx = 0;
            this.update();
        },
        tap(e) {
            e.stopPropagation(); // Чтобы клик по игре не срабатывал как клик по UI
            this.score += 15;
            document.getElementById('fill').style.width = this.score + '%';
            
            if (this.score >= 100) {
                this.score = 0;
                document.getElementById('fill').style.width = '0%';
                this.story[this.idx].hasGame = false; // Выключаем игру в текущем кадре
                this.next(); // Переходим к следующему кадру
            }
        }
    };

    window.onload = () => game.update();
</script>
</body>
</html>
