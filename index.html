<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanya Quest V 4.4 - Character Colors</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Georgia', serif; overflow: hidden; touch-action: manipulation; }
        #game-container { display: none; flex-direction: column; width: 100vw; height: 100vh; position: relative; background: #111; transition: filter 0.3s; }
        
        #start-screen { position: fixed; top:0; left:0; width: 100%; height:100%; background: radial-gradient(circle, #222 0%, #000 100%); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #start-btn { background: #fc0; color: #000; border: none; padding: 25px 60px; font-weight: bold; font-size: 22px; border-radius: 50px; cursor: pointer; box-shadow: 0 0 30px rgba(252, 204, 0, 0.5); }

        #scene { position: absolute; top: 0; left: 0; width: 100%; height: 65%; background-size: cover; background-position: center; background-color: #1a1a1a; z-index: 1; transition: background 0.4s, filter 0.5s, transform 0.5s; }
        .focus-mode { filter: blur(8px) brightness(0.4); transform: scale(1.05); }

        #hero { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); height: 95%; z-index: 5; display: none; pointer-events: none; transition: opacity 0.3s, transform 0.3s; filter: drop-shadow(0 0 20px rgba(0,0,0,0.8)); }
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; cursor: pointer; }
        #bar-container { width: 75%; height: 35px; border: 3px solid #fff; border-radius: 20px; overflow: hidden; margin-top: 20px; background: rgba(255,255,255,0.1); }
        #fill { width: 0%; height: 100%; background: #fc0; transition: width 0.08s linear; box-shadow: 0 0 15px #fc0; }
        
        .fail-state #fill { background: #f00 !important; box-shadow: 0 0 40px #f00 !important; transition: width 1.5s ease-in !important; }
        .red-alert { filter: sepia(1) saturate(5) hue-rotate(-50deg) !important; }
        
        .long-shake { animation: shake 1.8s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            0%, 100% { transform: translate3d(0, 0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate3d(-8px, 0, 0); }
            20%, 40%, 60%, 80% { transform: translate3d(8px, 0, 0); }
        }

        #ui { position: absolute; bottom: 0; width: 100%; height: 35%; background: #000; border-top: 3px solid #fc0; display: flex; flex-direction: column; box-sizing: border-box; padding: 15px 20px; z-index: 100; transition: border-color 0.4s; }
        #text-area { flex-grow: 1; overflow-y: auto; padding-bottom: 45px; }
        #next-btn { position: absolute; bottom: 15px; right: 20px; background: #fc0; color: #000; border: none; padding: 12px 30px; font-weight: bold; cursor: pointer; display: none; border-radius: 5px; font-size: 16px; }
        
        #name { font-weight: bold; font-size: 18px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; transition: color 0.4s; }
        #text { font-size: 17px; line-height: 1.4; color: #eee; }
        
        #sound-btn { position: fixed; top: 10px; left: 10px; z-index: 1001; font-size: 20px; cursor: pointer; background: rgba(0,0,0,0.6); border: 1px solid #fc0; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        #v { position: fixed; top: 5px; right: 5px; font-size: 9px; color: #444; z-index: 1000; }
        @keyframes blink { 0%, 100% {opacity: 1;} 50% {opacity: 0.3;} }
    </style>
</head>
<body>
    <div id="v">V 4.4 - COLORS UPDATE</div>
    
    <div id="start-screen">
        <h1 style="color:#fc0; font-size: 40px;">SANYA QUEST</h1>
        <button id="start-btn" onclick="game.init()">НАЧАТЬ ИГРАТЬ</button>
    </div>

    <div id="sound-btn" onclick="game.toggleMusic(event)">🔊</div>

    <div id="game-container">
        <div id="scene"></div>
        <img id="hero" src="" alt="">
        <div id="overlay" onmousedown="game.tap(event)" onclick="game.tap(event)">
            <h2 id="game-title" style="margin:0; color:#fc0;"></h2>
            <div id="bar-container"><div id="fill"></div></div>
            <p id="game-hint" style="color: #fff; margin-top: 15px; font-weight: bold; animation: blink 0.8s infinite;">ЖМИ БЫСТРЕЕ!</p>
        </div>
        <div id="ui">
            <div id="name">САНЯ</div>
            <div id="text-area"><div id="text"></div></div>
            <button id="next-btn" onclick="game.next()">ПРОДОЛЖИТЬ →</button>

            try {

                musicGain.connect(audioCtx.destination);
                musicGain.gain.value = 0.4;
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                this.startMusic();
            } catch(e) {}
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            this.update();
        },

                osc.start(); osc.stop(audioCtx.currentTime + 0.04);
            } catch(e) {}
        },
