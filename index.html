<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanya Quest V 5.3 - Character Focus</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Georgia', serif; overflow: hidden; touch-action: manipulation; }
        #game-container { display: none; flex-direction: column; width: 100vw; height: 100vh; position: relative; background: #111; }
        
        #start-screen { position: fixed; top:0; left:0; width: 100%; height:100%; background: radial-gradient(circle, #222 0%, #000 100%); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #start-btn { background: #fc0; color: #000; border: none; padding: 25px 60px; font-weight: bold; font-size: 22px; border-radius: 50px; cursor: pointer; box-shadow: 0 0 30px rgba(252, 204, 0, 0.5); margin-bottom: 15px; }
        #reset-btn { background: transparent; color: #666; border: 1px solid #444; padding: 10px 20px; font-size: 12px; border-radius: 5px; cursor: pointer; }

        /* Сцена теперь ВСЕГДА статична и не прыгает */
        #scene { position: absolute; top: 0; left: 0; width: 100%; height: 65%; background-size: cover; background-position: center; background-color: #1a1a1a; z-index: 1; transition: background 0.6s, filter 0.5s; }
        
        /* Эффект фокуса теперь только слегка затемняет и блюрит ФОН, но не трогает персонажа */
        .focus-mode { filter: blur(5px) brightness(0.5); }
        
        /* ПЕРСОНАЖ: теперь только ОН дышит и двигается */
        #hero { 
            position: absolute; 
            bottom: 0; 
            left: 50%; 
            transform: translateX(-50%); 
            height: 95%; 
            z-index: 5; 
            display: none; 
            pointer-events: none; 
            transition: opacity 0.5s ease; 
            filter: drop-shadow(0 0 25px rgba(0,0,0,0.9));
            transform-origin: bottom center; 
            will-change: transform;
        }
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; cursor: pointer; }
        #bar-container { width: 75%; height: 35px; border: 3px solid #fff; border-radius: 20px; overflow: hidden; margin-top: 20px; background: rgba(255,255,255,0.1); }
        #fill { width: 0%; height: 100%; background: #fc0; transition: width 0.08s linear; box-shadow: 0 0 15px #fc0; }
        
        #ui { position: absolute; bottom: 0; width: 100%; height: 35%; background: #000; border-top: 3px solid #fc0; display: flex; flex-direction: column; box-sizing: border-box; padding: 15px 20px; z-index: 100; transition: border-color 0.4s; }
        #text-area { flex-grow: 1; overflow-y: auto; padding-bottom: 45px; }
        #next-btn { position: absolute; bottom: 15px; right: 20px; background: #fc0; color: #000; border: none; padding: 12px 30px; font-weight: bold; cursor: pointer; display: none; border-radius: 5px; font-size: 16px; z-index: 110; }
        
        #choices-container { display: none; flex-direction: column; gap: 10px; margin-top: 10px; padding-bottom: 20px; }
        .choice-btn { background: #222; color: #fff; border: 1px solid #fc0; padding: 12px; border-radius: 8px; cursor: pointer; text-align: center; transition: background 0.2s; font-size: 15px; }
        .choice-btn:hover { background: #333; }

        #name { font-weight: bold; font-size: 18px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; transition: color 0.4s; }
        #text { font-size: 17px; line-height: 1.4; color: #eee; }
        
        #sound-btn { position: fixed; top: 10px; left: 10px; z-index: 1001; font-size: 20px; cursor: pointer; background: rgba(0,0,0,0.6); border: 1px solid #fc0; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        #v { position: fixed; top: 5px; right: 5px; font-size: 9px; color: #444; z-index: 1000; }

        /* АНИМАЦИИ ТОЛЬКО ДЛЯ ПЕРСОНАЖА */
        .hero-enter { animation: hero-enter-anim 0.8s cubic-bezier(0.175, 0.885, 0.32, 1) forwards; }
        @keyframes hero-enter-anim {
            from { opacity: 0; transform: translate(-50%, 40px) scale(0.95); }
            to { opacity: 1; transform: translate(-50%, 0) scale(1); }
        }

        .hero-idle { animation: hero-breathing 3.5s ease-in-out infinite; }
        @keyframes hero-breathing {
            0%, 100% { transform: translate(-50%, 0) scale(1); }
            50% { transform: translate(-50%, -10px) scale(1.03, 1.01); }
        }

        .shake-quick { animation: shake-quick-anim 0.4s both; }
        @keyframes shake-quick-anim {
            0%, 100% { transform: translate(0,0); }
            25% { transform: translate(-4px, 0); }
            75% { transform: translate(4px, 0); }
        }
        @keyframes blink { 0%, 100% {opacity: 1;} 50% {opacity: 0.3;} }
    </style>
</head>
<body>
    <div id="v">V 5.3 - BREATHING CHARACTERS</div>
    
    <div id="start-screen">
        <h1 style="color:#fc0; font-size: 40px;">SANYA QUEST</h1>
        <button id="start-btn" onclick="game.init()">ИГРАТЬ</button>
        <button id="reset-btn" onclick="game.resetSave()">Сбросить прогресс</button>
    </div>
    <div id="sound-btn" onclick="game.toggleMusic(event)">🔊</div>

    <div id="game-container">
        <div id="scene"></div>
        <img id="hero" src="" alt="">
        
        <div id="overlay" onmousedown="game.tap(event)" onclick="game.tap(event)">
            <h2 id="game-title" style="margin:0; color:#fc0;"></h2>
            <div id="bar-container"><div id="fill"></div></div>
            <p id="game-hint" style="color: #fff; margin-top: 15px; font-weight: bold; animation: blink 0.8s infinite;">ЖМИ БЫСТРЕЕ!</p>
        </div>

        <div id="ui">
            <div id="name">САНЯ</div>
            <div id="text-area">
                <div id="text"></div>
                <div id="choices-container"></div>
            </div>
            <button id="next-btn" onclick="game.next()">ПРОДОЛЖИТЬ →</button>
        </div>
    </div>

<script>
    let audioCtx = null;
    let musicGain = null;
    const game = {
        idx: 0, score: 0, isTyping: false, isMuted: false, musicStarted: false, drainInterval: null,
        imgs: {
            // ФОНЫ (Декорации)
            bg_morning: "https://i.ibb.co/CNb9jhK/Gemini-Generated-Image-jgx79tjgx79tjgx7.png",
            bg_work: "https://i.ibb.co/W7XwXnJ/Gemini-Generated-Image-eemupteemupteemu.png",
            bg_airport: "https://i.ibb.co/rKHRdknD/photo-2026-04-20-12-34-59.jpg",
            bg_thoughts: "https://i.ibb.co/HTZqmm91/photo-2026-04-20-12-40-14.jpg",
            bg_bar: "https://i.ibb.co/39R0LNDX/1776641464055.png",
            bg_home: "https://i.ibb.co/mrWfGrYh/1776641563597.png",
            
            // ПЕРСОНАЖИ (Герои)
            sanya_morning: "https://i.ibb.co/CNb9jhK/Gemini-Generated-Image-jgx79tjgx79tjgx7.png",
            sanya_work: "https://i.ibb.co/W7XwXnJ/Gemini-Generated-Image-eemupteemupteemu.png",
            sanya_airport: "https://i.ibb.co/rKHRdknD/photo-2026-04-20-12-34-59.jpg",
            sanya_plane: "https://i.ibb.co/HTZqmm91/photo-2026-04-20-12-40-14.jpg",
            dima: "https://i.ibb.co/0jMLHKCT/1776641481868.png",
            dima_home: "https://i.ibb.co/3mNShXVr/photo-2026-04-20-16-18-57.jpg",
            gosha: "https://i.ibb.co/CLDvbjB/1776641475450.png",
            gosha_food: "https://i.ibb.co/mFGx7Bbg/photo-2026-04-20-16-08-46.jpg",
            gosha_troll: "https://i.ibb.co/jPHM7bvj/photo-2026-04-20-16-06-59.jpg"
        },
        colors: {
            "Саня": "#fc0", "Дима": "#ff3030", "Гоша": "#30ff30", "Работа": "#fc0", "Рассказчик": "#888"
        },
        story: [
            // Теперь мы указываем b (фон) и c (героя) отдельно!
            { n: "Саня", t: "Доброе утро, я проснулся...", b: 'bg_morning', c: 'sanya_morning' },
            { n: "Рассказчик", t: "Сегодня важный день. Куда отправимся первым делом?", b: 'bg_morning', c: 'sanya_morning',
              choices: [
                  { text: "На работу (давить тягу)", nextIdx: 2 },
                  { text: "Сразу в аэропорт", nextIdx: 3 }
              ] 
            },
            { n: "Работа", t: "Так, смена началась. Погнали!", b: 'bg_work', c: 'sanya_work', hasGame: "train" },
            { n: "Саня", t: "Фух, наконец-то отпуск! Лечу в Москву!", b: 'bg_airport', c: 'sanya_airport' },
            { n: "Саня", t: "Гул самолёта убаюкивает. Все мысли о Кате.", b: 'bg_thoughts', c: 'sanya_plane' },
            { n: "Дима", t: "Саня! Брат! Ну ты и вымахал!", b: 'bg_bar', c: 'dima' },
            { n: "Гоша", t: "Ну что, по первой за приезд?", b: 'bg_bar', c: 'gosha' },
            { n: "Рассказчик", t: "Ночь медленно опустилась на столицу.", b: 'bg_home', c: 'none' },
            { n: "Дима", t: "Сань, не держи в себе. Мы с тобой, бро.", b: 'bg_home', c: 'dima_home' },
            { n: "Гоша", t: "О, доставка как раз вовремя!", b: 'bg_home', c: 'gosha_food' },
            { n: "Дима", t: "Ха-ха-ха! Гошан, делись!", b: 'bg_home', c: 'dima_home', effect: 'shake-quick' },
            { n: "Саня", t: "Ну всё, Гоша, в атаку!", b: 'bg_home', c: 'none', hasGame: "nuggets" },
            { n: "Рассказчик", t: "Продолжение следует...", b: 'bg_home', c: 'none' }
        ],

        async init() {
            const savedIdx = localStorage.getItem('sanya_quest_idx');
            if (savedIdx !== null) this.idx = parseInt(savedIdx);

            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                musicGain = audioCtx.createGain();
                musicGain.connect(audioCtx.destination);
                musicGain.gain.value = 0.4;
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                this.startMusic();
            } catch(e) {}
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            this.update();
        },

        resetSave() {
            localStorage.removeItem('sanya_quest_idx');
            alert("Прогресс сброшен.");
            location.reload();
        },

        startMusic() {
            if (this.musicStarted || !audioCtx) return;
            this.musicStarted = true;
            setInterval(() => {
                if (this.isMuted || audioCtx.state === 'suspended') return;
                try {
                    const f = [196, 220, 246, 261][Math.floor(Date.now()/1200)%4];
                    const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(f/2, audioCtx.currentTime);
                    g.gain.setValueAtTime(0, audioCtx.currentTime);
                    g.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 0.1);
                    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.5);
                    osc.connect(g); g.connect(musicGain); osc.start(); osc.stop(audioCtx.currentTime + 2.5);
                } catch(e) {}
            }, 1250);
        },

        toggleMusic(e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            this.isMuted = !this.isMuted;
            document.getElementById('sound-btn').innerText = this.isMuted ? "🔇" : "🔊";
            if (!this.musicStarted) this.startMusic();
        },

        typeText(element, text) {
            let i = 0; element.innerHTML = ""; this.isTyping = true;
            const nextBtn = document.getElementById('next-btn');
            const choicesEl = document.getElementById('choices-container');
            nextBtn.style.display = 'none';
            choicesEl.style.display = 'none';

            if (this.textTimer) clearInterval(this.textTimer);
            this.textTimer = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                } else { 
                    clearInterval(this.textTimer); this.isTyping = false;
                    this.showPostTextUI();
                }
            }, 30);
        },

        showPostTextUI() {
            const s = this.story[this.idx];
            const nextBtn = document.getElementById('next-btn');
            const choicesEl = document.getElementById('choices-container');

            if (s.choices) {
                choicesEl.innerHTML = "";
                s.choices.forEach(c => {
                    const btn = document.createElement('div');
                    btn.className = "choice-btn";
                    btn.innerText = c.text;
                    btn.onclick = () => { this.idx = c.nextIdx; this.update(); };
                    choicesEl.appendChild(btn);
                });
                choicesEl.style.display = 'flex';
            } else if (!s.hasGame) {
                nextBtn.style.display = 'block';
            }
        },
        
        update() {
            localStorage.setItem('sanya_quest_idx', this.idx);
            const s = this.story[this.idx];
            const scene = document.getElementById('scene');
            const hero = document.getElementById('hero');
            const ui = document.getElementById('ui');
            const nameEl = document.getElementById('name');

            hero.className = ''; 
            scene.classList.remove('shake-quick');
            hero.style.opacity = '';

            // Установка ФОНА (Декорация)
            scene.style.backgroundImage = `url('${this.imgs[s.b]}')`;
            const charColor = this.colors[s.n] || "#fff";
            nameEl.style.color = charColor;
            ui.style.borderColor = charColor;
            
            // Установка ГЕРОЯ (Тот, кто дышит)
            if (s.c && s.c !== 'none') {
                scene.classList.add('focus-mode'); // Фокус только на ФОН
                if(hero.src !== this.imgs[s.c]) hero.src = this.imgs[s.c];
                hero.style.display = 'block';
                hero.classList.add('hero-enter');
                setTimeout(() => { if(hero.classList.contains('hero-enter')) hero.classList.add('hero-idle'); }, 800);
            } else {
                scene.classList.remove('focus-mode');
                hero.style.opacity = '0';
                setTimeout(() => { if (!this.story[this.idx].c || this.story[this.idx].c === 'none') hero.style.display = 'none'; }, 300);
            }
            
            if (s.effect === 'shake-quick') scene.classList.add('shake-quick');

            nameEl.innerText = s.n;
            
            const overlay = document.getElementById('overlay');
            if (s.hasGame) {
                this.score = 0;
                document.getElementById('fill').style.width = '0%';
                overlay.style.display = 'flex';
                document.getElementById('game-title').innerText = s.hasGame === "train" ? "ДАВИ ТЯГУ!" : "ОТБЕРИ НАГГЕТСЫ!";
                this.startDrain(s.hasGame);
            } else {
                overlay.style.display = 'none';
                this.stopDrain();
            }
            this.typeText(document.getElementById('text'), s.t);
        },

        startDrain(type) {
            this.stopDrain();
            this.drainInterval = setInterval(() => {
                if (this.score > 0) {
                    this.score -= (type === "train") ? 2.5 : (1.9 + (this.score / 20));
                    document.getElementById('fill').style.width = Math.max(0, this.score) + '%';
                }
            }, 100);
        },

        stopDrain() { if (this.drainInterval) clearInterval(this.drainInterval); },

        next() {
            if (this.isTyping || this.story[this.idx].hasGame || this.story[this.idx].choices) return;
            this.idx = (this.idx + 1) % this.story.length;
            this.update();
        },

        tap(e) {
            e.preventDefault();
            if (!this.story[this.idx].hasGame) return;
            const type = this.story[this.idx].hasGame;
            this.score += (type === "train") ? 9 : 11;
            
            if (this.score >= 100) {
                this.score = 100;
                document.getElementById('fill').style.width = '100%';
                this.stopDrain();
                this.story[this.idx].hasGame = false;
                setTimeout(() => this.next(), 200);
            } else {
                document.getElementById('fill').style.width = this.score + '%';
            }
        }
    };
</script>
</body>
</html>
