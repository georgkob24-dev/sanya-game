<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanya Quest V 8.0 - Full Original Logic</title>
    <style>
        /* =========================================
           БЛОК СТИЛЕЙ (ПОЛНАЯ ВЕРСИЯ 7.6+)
           ========================================= */
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Georgia', serif; 
            overflow: hidden; 
            touch-action: manipulation; 
            user-select: none;
        }

        #game-container { 
            display: none; 
            flex-direction: column; 
            width: 100vw; 
            height: 100vh; 
            position: relative; 
            background: #000; 
        }

        #version-tag { 
            position: fixed; 
            top: 10px; 
            left: 60px; 
            z-index: 4000; 
            color: #fc0; 
            font-weight: bold; 
            font-size: 18px; 
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000; 
            pointer-events: none; 
        }
        
        #start-screen, #end-screen, #fail-screen { 
            position: fixed; 
            top:0; 
            left:0; 
            width: 100%; 
            height:100%; 
            background: radial-gradient(circle, #222 0%, #000 100%); 
            z-index: 2000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
        }

        #fail-screen { display: none; background: #900; z-index: 2500; }
        #end-screen { display: none; background: #000; z-index: 2100; }

        .main-btn { 
            background: #fc0; 
            color: #000; 
            border: none; 
            padding: 20px 50px; 
            font-weight: bold; 
            font-size: 20px; 
            border-radius: 50px; 
            cursor: pointer; 
            box-shadow: 0 0 30px rgba(252, 204, 0, 0.5); 
            margin-bottom: 15px; 
            transition: transform 0.1s, box-shadow 0.2s; 
        }

        .main-btn:hover { box-shadow: 0 0 40px rgba(252, 204, 0, 0.7); }
        .main-btn:active { transform: scale(0.95); }

        .reset-btn { 
            background: transparent; 
            color: #666; 
            border: 1px solid #444; 
            padding: 10px 20px; 
            font-size: 13px; 
            border-radius: 5px; 
            cursor: pointer; 
            margin-top: 20px;
        }

        #fade-layer { 
            position: absolute; 
            top:0; 
            left:0; 
            width:100%; 
            height:100%; 
            background: #000; 
            z-index: 150; 
            pointer-events: none; 
            opacity: 0; 
            transition: opacity 0.5s; 
        }

        #scene { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 65%; 
            background-size: cover; 
            background-position: center; 
            transition: filter 0.5s, transform 0.5s; 
        }

        .focus-mode { filter: blur(5px) brightness(0.4); }

        #hero { 
            position: absolute; 
            bottom: 0; 
            left: 50%; 
            transform: translateX(-50%); 
            height: 95%; 
            z-index: 5; 
            display: none; 
            pointer-events: none; 
            transition: opacity 0.5s ease; 
            filter: drop-shadow(0 0 25px rgba(0,0,0,0.9)); 
            transform-origin: bottom center; 
        }

        #ui { 
            position: absolute; 
            bottom: 0; 
            width: 100%; 
            height: 35%; 
            background: #000; 
            border-top: 3px solid #fc0; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box; 
            padding: 15px 20px; 
            z-index: 100; 
            cursor: pointer; 
        }

        #text-area { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding-bottom: 45px; 
            position: relative; 
            pointer-events: none; 
        }

        #name { 
            font-weight: bold; 
            font-size: 20px; 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        #text { 
            font-size: 18px; 
            line-height: 1.5; 
            color: #eee; 
        }

        #overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.85); 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 50; 
            cursor: pointer; 
        }

        #bar-container { 
            width: 80%; 
            height: 40px; 
            border: 3px solid #fff; 
            border-radius: 25px; 
            overflow: hidden; 
            margin-top: 20px; 
            background: rgba(255,255,255,0.1); 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #fill { 
            width: 0%; 
            height: 100%; 
            background: linear-gradient(90deg, #f0ad4e, #fc0); 
            transition: width 0.08s linear; 
        }

        #next-btn { 
            position: absolute; 
            bottom: 15px; 
            right: 20px; 
            background: #fc0; 
            color: #000; 
            border: none; 
            padding: 12px 35px; 
            font-weight: bold; 
            cursor: pointer; 
            display: none; 
            border-radius: 5px; 
            z-index: 105; 
        }

        #prev-btn { 
            position: absolute; 
            bottom: 15px; 
            left: 20px; 
            background: rgba(255,255,255,0.1); 
            color: #fff; 
            border: 1px solid #444; 
            padding: 12px 20px; 
            cursor: pointer; 
            display: none; 
            border-radius: 5px; 
            z-index: 105; 
        }

        #sound-btn { 
            position: fixed; 
            top: 10px; 
            left: 10px; 
            z-index: 3000; 
            font-size: 20px; 
            cursor: pointer; 
            background: rgba(0,0,0,0.6); 
            border: 1px solid #fc0; 
            border-radius: 50%; 
            width: 45px; 
            height: 45px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        /* АНИМАЦИИ И ЭФФЕКТЫ */
        .shake-text { 
            display: inline-block; 
            animation: text-shake-anim 0.2s infinite; 
            color: #f44 !important; 
        }

        .heart-text { 
            display: inline-block; 
            color: #ff69b4 !important; 
            text-shadow: 0 0 10px rgba(255,105,180,0.8); 
            font-weight: bold;
        }

        @keyframes text-shake-anim { 
            0% { transform: translate(1px, 1px); } 
            25% { transform: translate(-1px, -1px); } 
            50% { transform: translate(-1px, 1px); } 
            100% { transform: translate(1px, 1px); } 
        }

        .hero-idle { animation: hero-breathing 3.5s ease-in-out infinite; }
        @keyframes hero-breathing { 
            0%, 100% { transform: translate(-50%, 0) scale(1); } 
            50% { transform: translate(-50%, -10px) scale(1.02); } 
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div id="version-tag">V 8.0</div>
    <div id="sound-btn" onclick="game.toggleMusic(event)">🔊</div>

    <div id="start-screen">
        <h1 style="color:#fc0; font-size: 48px; text-shadow: 0 0 30px rgba(252,204,0,0.5); margin-bottom: 10px;">SANYA QUEST</h1>
        <p style="color:#aaa; font-size: 18px; margin-bottom: 40px;">Глава: Путь к Кате</p>
        <button class="main-btn" onclick="game.init()">ИГРАТЬ</button>
        <button class="reset-btn" onclick="game.confirmReset()">СБРОСИТЬ СОХРАНЕНИЯ</button>
    </div>

    <div id="fail-screen">
        <h1 style="color:#fff; font-size: 36px;">ПРОВАЛ</h1>
        <p style="margin-bottom: 30px; font-size: 18px; color: #ccc;">Силы покинули тебя в самый важный момент.</p>
        <button class="main-btn" onclick="game.restartLevel()">ПЕРЕЗАГРУЗКА</button>
    </div>

    <div id="end-screen">
        <h2 style="color:#fc0; font-size: 36px;">ФИНАЛ</h2>
        <p style="font-size: 20px; color: #eee; padding: 0 30px;">Их история только начинается...</p>
        <button class="main-btn" onclick="game.resetSave()">НА ГЛАВНУЮ</button>
    </div>

    <div id="game-container">
        <div id="fade-layer"></div>
        <div id="scene"></div>
        <img id="hero" src="" class="hero-idle">
        
        <div id="overlay" onmousedown="game.tap(event)">
            <h2 id="game-title" style="margin:0; color:#fc0; font-size: 28px;">МИНИ-ИГРА</h2>
            <div id="bar-container"><div id="fill"></div></div>
            <p style="color: #fff; margin-top: 20px; font-weight: bold; animation: pulse 0.8s infinite;">ЖМИ БЫСТРО!</p>
        </div>

        <div id="ui" onclick="game.handleUiClick()">
            <div id="name"></div>
            <div id="text-area"><div id="text"></div></div>
            <button id="prev-btn" onclick="event.stopPropagation(); game.prev()">← НАЗАД</button>
            <button id="next-btn" onclick="event.stopPropagation(); game.next()">ДАЛЕЕ →</button>
        </div>
    </div>

<script>
    /* =========================================
       ЛОГИКА ИГРЫ (ПОЛНЫЙ ДВИЖОК)
       ========================================= */
    let audioCtx = null;
    let musicGain = null;

    const game = {
        idx: 0, 
        isTyping: false, 
        score: 0, 
        gameActive: false, 
        isMuted: false,
        tTimer: null, 
        dTimer: null,
        currentFullText: "", 
        currentShake: false, 
        currentHeart: false,

        imgs: {
            morning: "https://i.ibb.co/CNb9jhK/Gemini-Generated-Image-jgx79tjgx79tjgx7.png",
            work: "https://i.ibb.co/W7XwXnJ/Gemini-Generated-Image-eemupteemupteemu.png",
            airport: "https://i.ibb.co/rKHRdknD/photo-2026-04-20-12-34-59.jpg",
            thoughts: "https://i.ibb.co/HTZqmm91/photo-2026-04-20-12-40-14.jpg",
            bar_bg: "https://i.ibb.co/39R0LNDX/1776641464055.png",
            home_bg: "https://i.ibb.co/mrWfGrYh/1776641563597.png",
            dima: "https://i.ibb.co/0jMLHKCT/1776641481868.png",
            gosha_food: "https://i.ibb.co/mFGx7Bbg/photo-2026-04-20-16-08-46.jpg",
            gosha_troll: "https://i.ibb.co/jPHM7bvj/photo-2026-04-20-16-06-59.jpg",
            artur_alone: "https://i.ibb.co/MkyMz1qd/image-1776707959628128.png",
            easter_eggs: "https://i.ibb.co/20QGcHYy/2112f813-76ff-4959-8407-9d040cd32d81.png",
            tattoo_work: "https://i.ibb.co/XZ4CnSBp/Chat-GPT-Image-21-2026-02-05-41.png",
            katya_love: "https://i.ibb.co/gZYcRHtd/9304cf07-26b7-4f8f-98c9-dc16011a40a1.png",
            the_kiss: "https://i.ibb.co/s8SJrcp/8a8731f4-a7c7-4f05-a492-8de012834638.png",
            final_park: "https://i.ibb.co/Zz1Zgx4p/Chat-GPT-Image-21-2026-02-12-47.png"
        },

        colors: { 
            "Саня": "#fc0", "Дима": "#ff3030", "Гоша": "#30ff30", 
            "Артур": "#00dfff", "Катя": "#b388ff", "Рассказчик": "#888", "Работа": "#fc0" 
        },

        /* СЮЖЕТНЫЙ МАССИВ */
        story: [
            { n: "Саня", t: "Доброе утро, я проснулся... Снова этот знакомый до боли потолок в Орске. Трещина в углу стала как будто больше. Каждый день здесь — это вязкий день сурка. В голове только одна мысль: когда это кончится?", b: 'morning' },
            { n: "Работа", t: "Так, смена началась! Саня, соберись! Погнали давить тягу, состав сам себя не доставит! Только ты и железная мощь под тобой! Не подведи депо!", b: 'work', hasGame: "train" },
            { n: "Саня", t: "Фух... Смена закрыта. Руки до сих пор гудят от вибрации контроллера. Но сегодня всё иначе. Наконец-то отпуск! РЖД, увидимся через две недели. Я улетаю.", b: 'airport' },
            { n: "Рассказчик", t: "Гул самолётных двигателей убаюкивает, но внутри у Сани — звенящая пустота. Все мысли, как по рельсам, возвращаются к одному и тому же... к Кате. Он смотрит в иллюминатор на облака, и в его душе разверзается настоящая бездна. Он знает: у неё есть парень. Он не хочет разрушать чужое счастье, но и молчать больше нет сил. Эта неопределенность убивает его медленнее, чем тяжелая смена в депо.", b: 'thoughts' },
            { n: "Дима", t: "Саня! Брат! Ну ты и вымахал! Здорово, машинист! Москва тебя заждалась. Ну что, по первой за приезд? За твой долгожданный отдых и за то, что ты наконец-то вырвался из своего Орска!", b: 'bar_bg', c: 'dima' },
            { n: "Гоша", t: "Опа! Кто приехал! А я тут как раз наггетсы заказал. Доставка прямо к твоему появлению. Но предупреждаю сразу: это моя добыча! Кто успел — тот и съел!", b: 'home_bg', c: 'gosha_food' },
            { n: "Саня", t: "Ах так? Ну держись, Гошан! Сейчас я покажу тебе, на что способны железнодорожные войска, когда они голодны и злы!", b: 'home_bg', hasGame: "nuggets", shakeOnType: true },
            { n: "Гоша", t: "Ахахах! Ребята, вы правда думали, что сможете их отобрать? Все наггетсы мои! Я тренировал реакцию в играх годами, вам меня не победить!", b: 'home_bg', c: 'gosha_troll' },
            { n: "Артур", t: "Салям, Саня! Как тебе мои напутствия? Слушай сюда внимательно: жизнь — она как железная дорога. Главное — не сворачивать с рельс своего сердца, даже если стрелку перевели не туда. Ты же не боишься, правда? Всё будет хорошо, бауырым. Просто верь в себя.", b: 'morning', c: 'artur_alone' },
            { n: "Саня", t: "Я всё-таки решился. Позвал Катю домой к Артуру и Соне. Решил, что это идеальный момент. Сказал ей, что совершенно не умею красить яйца к Пасхе. Даже Артуру в панике написал: 'Брат, как их вообще варить, чтобы они не превратились в камни?!'", b: 'easter_eggs' },
            { n: "Артур", t: "Ахаха! Саня, ты серьезно? Машинист тяжелых составов не может справиться с обычным куриным яйцом? Ну ты даешь! Короче, бауырым, просто клади в воду и следи за таймером. И не позорь меня перед дамой, будь мужиком!", b: 'easter_eggs', c: 'artur_alone' },
            { n: "Рассказчик", t: "Сане стало жутко неловко от подколов Артура. Лицо предательски покраснело. Но Катя лишь тепло и искренне улыбнулась. Весь вечер они провели вместе: она учила его магии покраски, они смеялись и болтали обо всем на свете, забыв про время. В конце Саня угостил её куличом. В этом доме наконец-то стало по-настоящему уютно и спокойно. Кажется, бездна начала отступать.", b: 'easter_eggs' },
            { n: "Рассказчик", t: "Прошло пару дней. Саня пришел к ней в тату-салон. Жужжание машинки, специфический запах антисептика... Катя била ему новую татуировку. Она была предельно сосредоточена, её лицо находилось совсем близко, он чувствовал её дыхание. В этой тишине воздух будто загустел от невысказанных слов.", b: 'tattoo_work' },
            { n: "Катя", t: "Саш... я больше не могу это держать в себе. Я рассталась с ним. Всё кончено. Совсем. И я поняла... я люблю тебя. Давно люблю. Очень. ♥♥♥", b: 'katya_love', isHeart: true },
            { n: "Рассказчик", t: "Саша замер. Сердце пропустило удар, а потом забилось с такой силой, что казалось, оно сейчас выпрыгнет. Он не верил своим ушам. Неужели этот бесконечный путь из Орска привел его именно сюда? Оказывается, она ему тоже нравилась безумно долго, но он считал её недосягаемой мечтой. Это был лучший день в его жизни, день, которого он совсем не ожидал и о котором боялся даже мечтать.", b: 'katya_love' },
            { n: "Рассказчик", t: "Она осторожно откладывает инструмент в сторону и берет его за щеку своей теплой ладонью. Их взгляды встречаются, и весь мир за пределами этой комнаты просто перестает существовать. Нет больше ни работы, ни проблем, ни расстояний. Первый поцелуй... чувства, которые копились годами, наконец-то вырвались на свободу, переполняя обоих.", b: 'the_kiss' },
            { n: "Рассказчик", t: "Финал этой поездки был сказочным. Они пошли в парк аттракционов. Ветер в лицо на самой вершине колеса обозрения, её рука крепко сжимает его руку, и ощущение полного, абсолютного счастья накрывает с головой. Они и подумать не могли, что всё сложится именно так. Но судьба любит смелых и искренних. Саня наконец-то нашел свой настоящий дом. В её глазах. Конец.", b: 'final_park' }
        ],

        /* ИНИЦИАЛИЗАЦИЯ */
        async init() {
            const saved = localStorage.getItem('sanya_quest_idx');
            if (saved) this.idx = Math.min(parseInt(saved), this.story.length - 1);
            
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                musicGain = audioCtx.createGain(); 
                musicGain.connect(audioCtx.destination);
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                this.startMusicLoop();
            } catch(e) { console.warn("Audio blocked"); }
            
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            this.update();
        },

        /* ЗВУКОВОЙ ДВИЖОК */
        playClickSound() {
            if (!audioCtx || this.isMuted) return;
            const osc = audioCtx.createOscillator(); 
            const g = audioCtx.createGain();
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(280, audioCtx.currentTime);
            g.gain.setValueAtTime(0.04, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.03);
            osc.connect(g); 
            g.connect(audioCtx.destination);
            osc.start(); 
            osc.stop(audioCtx.currentTime + 0.04);
        },

        startMusicLoop() {
            setInterval(() => {
                if (this.isMuted || !audioCtx) return;
                const notes = [196, 220, 246, 261];
                const f = notes[Math.floor(Date.now()/1200)%4];
                const osc = audioCtx.createOscillator(); 
                const g = audioCtx.createGain();
                osc.type = 'triangle'; 
                osc.frequency.setValueAtTime(f/2, audioCtx.currentTime);
                g.gain.setValueAtTime(0, audioCtx.currentTime);
                g.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 0.1);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.5);
                osc.connect(g); 
                g.connect(musicGain); 
                osc.start(); 
                osc.stop(audioCtx.currentTime + 2.5);
            }, 1250);
        },

        toggleMusic(e) {
            e.stopPropagation(); 
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            this.isMuted = !this.isMuted;
            document.getElementById('sound-btn').innerText = this.isMuted ? "🔇" : "🔊";
        },

        /* УПРАВЛЕНИЕ СЦЕНАМИ */
        update() {
            localStorage.setItem('sanya_quest_idx', this.idx);
            const s = this.story[this.idx];
            
            const sceneEl = document.getElementById('scene');
            sceneEl.style.backgroundImage = `url('${this.imgs[s.b]}')`;
            
            const heroEl = document.getElementById('hero');
            if (s.c) { 
                heroEl.src = this.imgs[s.c]; 
                heroEl.style.display = 'block'; 
                sceneEl.classList.add('focus-mode'); 
            } else { 
                heroEl.style.display = 'none'; 
                sceneEl.classList.remove('focus-mode'); 
            }
            
            document.getElementById('name').innerText = s.n;
            document.getElementById('name').style.color = this.colors[s.n] || "#fff";
            
            if (s.hasGame) { 
                this.gameActive = true; 
                this.score = 40; 
                document.getElementById('overlay').style.display = 'flex'; 
                document.getElementById('game-title').innerText = s.hasGame === "train" ? "ДАВИ ТЯГУ!" : "ОТБЕРИ НАГГЕТСЫ!";
                this.startMinigameLogic(); 
            } else { 
                this.gameActive = false; 
                document.getElementById('overlay').style.display = 'none'; 
            }

            this.typeWriterEffect(s.t, s.shakeOnType, s.isHeart);
        },

        typeWriterEffect(text, shake, heart) {
            this.isTyping = true; 
            this.currentFullText = text; 
            this.currentShake = shake; 
            this.currentHeart = heart;
            
            let charIndex = 0; 
            const textEl = document.getElementById('text'); 
            textEl.innerHTML = "";
            textEl.className = shake ? "shake-text" : (heart ? "heart-text" : "");
            
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('prev-btn').style.display = 'none';
            
            if (this.tTimer) clearInterval(this.tTimer);
            
            this.tTimer = setInterval(() => {
                if (charIndex < text.length) { 
                    textEl.innerHTML += text[charIndex++]; 
                    this.playClickSound(); 
                } else { 
                    clearInterval(this.tTimer); 
                    this.isTyping = false; 
                    this.showNavigation();
                }
            }, 30);
        },

        showNavigation() {
            document.getElementById('next-btn').style.display = 'block'; 
            if(this.idx > 0) document.getElementById('prev-btn').style.display = 'block';
        },

        handleUiClick() { 
            if (this.isTyping) { 
                clearInterval(this.tTimer); 
                this.isTyping = false; 
                document.getElementById('text').innerHTML = this.currentFullText; 
                this.showNavigation();
            } else if (!this.gameActive) {
                this.next(); 
            }
        },

        next() { 
            if (this.idx < this.story.length - 1) { 
                this.idx++; 
                this.update(); 
            } else {
                document.getElementById('end-screen').style.display = 'flex'; 
            }
        },

        prev() { 
            if (this.idx > 0) { 
                this.idx--; 
                this.update(); 
            } 
        },

        /* МИНИ-ИГРЫ */
        startMinigameLogic() { 
            if (this.dTimer) clearInterval(this.dTimer);
            this.dTimer = setInterval(() => { 
                if (!this.gameActive) { clearInterval(this.dTimer); return; } 
                this.score -= 2.2; 
                if (this.score <= 0) { 
                    document.getElementById('fail-screen').style.display = 'flex'; 
                    this.gameActive = false; 
                } 
                document.getElementById('fill').style.width = this.score + "%"; 
            }, 100); 
        },

        tap(e) { 
            e.preventDefault(); 
            if (this.gameActive) { 
                this.score += 9; 
                if (this.score >= 100) { 
                    this.gameActive = false; 
                    this.score = 100; 
                    setTimeout(() => this.next(), 200); 
                } 
                document.getElementById('fill').style.width = this.score + "%"; 
            } 
        },

        /* СИСТЕМНЫЕ ФУНКЦИИ */
        confirmReset() { 
            if (confirm("Весь прогресс будет стерт. Ты уверен?")) {
                this.resetSave(); 
            }
        },

        resetSave() { 
            localStorage.removeItem('sanya_quest_idx'); 
            location.reload(); 
        },

        restartLevel() { 
            document.getElementById('fail-screen').style.display = 'none'; 
            this.update(); 
        }
    };
</script>
</body>
</html>
